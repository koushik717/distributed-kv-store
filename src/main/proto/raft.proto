syntax = "proto3";
package raft;
option java_package = "com.koushik.kvstore.rpc.proto";
option java_outer_classname = "RaftProto";

// AppendEntries RPC — used for both heartbeats and log replication
message AppendEntriesRequest {
  int64 term = 1;               // leader's current term
  string leader_id = 2;         // so follower can redirect clients
  int64 prev_log_index = 3;     // index of log entry before new ones
  int64 prev_log_term = 4;      // term of prevLogIndex entry
  repeated LogEntry entries = 5; // empty for heartbeat
  int64 leader_commit = 6;      // leader's commitIndex
}

message AppendEntriesResponse {
  int64 term = 1;       // currentTerm, for leader to update itself
  bool success = 2;     // true if follower matched prevLogIndex/prevLogTerm
}

// RequestVote RPC — used during leader election
message RequestVoteRequest {
  int64 term = 1;          // candidate's term
  string candidate_id = 2; // candidate requesting vote
  int64 last_log_index = 3; // index of candidate's last log entry
  int64 last_log_term = 4;  // term of candidate's last log entry
}

message RequestVoteResponse {
  int64 term = 1;         // currentTerm, for candidate to update itself
  bool vote_granted = 2;  // true means candidate received vote
}

// A single log entry
message LogEntry {
  int64 index = 1;      // position in the log
  int64 term = 2;       // term when entry was received by leader
  string command = 3;   // serialized command: "PUT foo bar" or "DELETE foo"
}

// gRPC service definition
service RaftService {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
}
